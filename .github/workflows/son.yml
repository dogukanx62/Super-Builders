name: "Pixel 9 Pro XL (komodo/caimito) - KernelSU-Next + SUSFS + ZeroMount (safe dist build)"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      pixel_manifest_branch:
        description: "Google Pixel kernel manifest branch"
        type: string
        default: "android-gs-caimito-6.1-android16"
      manifest_snapshot_ref:
        description: >-
          Optional exact commit/tag in kernel/manifest. Leave empty to use the
          branch tip. For maximum compatibility, use the snapshot matching the
          Android build installed on the phone.
        type: string
        default: ""
      expected_sublevel:
        description: >-
          Expected 6.1 sublevel on the phone. The workflow stops before patching
          if the synced source does not match. Pixel 9 Pro XL example: 145.
        type: string
        default: "145"
      ksu_next_ref:
        description: "KernelSU-Next ref; default follows Super-Builders' current android14-6.1 pin"
        type: string
        default: "095f780bf8835e92b51d06fce4afe7733f86a64c"
      superbuilders_ref:
        description: "Super-Builders branch/tag/commit"
        type: string
        default: "main"
      apply_susfs:
        description: "Apply base SUSFS patch"
        type: boolean
        default: true
      apply_enhanced_susfs:
        description: "Apply enhanced SUSFS patch"
        type: boolean
        default: true
      apply_zeromount:
        description: "Apply ZeroMount patch"
        type: boolean
        default: true
      apply_ksu_safety:
        description: "Apply KernelSU-Next SUSFS safety integration patch"
        type: boolean
        default: true
      apply_overlayfs_support:
        description: "Enable TMPFS xattr/POSIX ACL options"
        type: boolean
        default: false
      allow_stock_module_version_mismatch:
        description: >-
          Permit stock vendor modules when only boot.img is test-booted. Keep
          enabled only when source sublevel/manifest matches the phone.
        type: boolean
        default: true
      upload_full_dist:
        description: "Upload dtbo/vendor_kernel_boot/vendor_dlkm/system_dlkm in addition to boot.img"
        type: boolean
        default: false

concurrency:
  group: caimito-kernel-${{ github.ref }}
  cancel-in-progress: false

env:
  ANDROID_VER: android14
  KERNEL_VER: "6.1"
  SB_VERSION_DIR: android14-6.1
  SB_PATCH_DIR: android14-6.1/KernelSU-Next/patches
  SB_HELPER_DIR: android14-6.1/build-helpers
  SB_FRAGMENT: android14-6.1/defconfig.fragment

jobs:
  build:
    name: "Build caimito local AOSP kernel"
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Free disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          testing: false

      - name: Add swap
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 24

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git curl patch zip unzip lz4 jq file rsync \
            lld binutils bc bison flex build-essential \
            libssl-dev libelf-dev dwarves device-tree-compiler

      - name: Checkout Super-Builders patch source
        uses: actions/checkout@v4
        with:
          repository: Enginex0/Super-Builders
          ref: ${{ inputs.superbuilders_ref }}
          path: super-builders
          fetch-depth: 1

      - name: Sync official Pixel caimito kernel source
        shell: bash
        env:
          MANIFEST_BRANCH: ${{ inputs.pixel_manifest_branch }}
          MANIFEST_SNAPSHOT: ${{ inputs.manifest_snapshot_ref }}
        run: |
          set -euo pipefail
          KERNEL_ROOT="$GITHUB_WORKSPACE/kernel"
          mkdir -p "$KERNEL_ROOT"
          cd "$KERNEL_ROOT"

          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b "$MANIFEST_BRANCH" \
            --depth=1

          if [[ -n "$MANIFEST_SNAPSHOT" ]]; then
            git -C .repo/manifests fetch --depth=1 origin "$MANIFEST_SNAPSHOT"
            git -C .repo/manifests checkout --detach FETCH_HEAD
          fi

          repo --trace sync -c -j4 --fail-fast --no-tags --force-sync --no-clone-bundle

          test -d "$KERNEL_ROOT/aosp"
          test -x "$KERNEL_ROOT/build_caimito.sh"

          {
            echo "KERNEL_ROOT=$KERNEL_ROOT"
            echo "AOSP_DIR=$KERNEL_ROOT/aosp"
            echo "DIST_DIR=$KERNEL_ROOT/out/caimito/dist"
          } >> "$GITHUB_ENV"

          repo manifest -r -o "$GITHUB_WORKSPACE/pinned-manifest.xml"

      - name: Verify source version before patching
        shell: bash
        env:
          EXPECTED_SUBLEVEL: ${{ inputs.expected_sublevel }}
        working-directory: ${{ github.workspace }}/kernel/aosp
        run: |
          set -euo pipefail
          VERSION=$(awk '/^VERSION =/{print $3; exit}' Makefile)
          PATCHLEVEL=$(awk '/^PATCHLEVEL =/{print $3; exit}' Makefile)
          SUBLEVEL=$(awk '/^SUBLEVEL =/{print $3; exit}' Makefile)
          FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

          echo "Synced source version: $FULL_VERSION"
          [[ "$VERSION.$PATCHLEVEL" == "$KERNEL_VER" ]] || {
            echo "::error::Expected kernel $KERNEL_VER, synced $FULL_VERSION"
            exit 1
          }

          if [[ -n "$EXPECTED_SUBLEVEL" && "$SUBLEVEL" != "$EXPECTED_SUBLEVEL" ]]; then
            echo "::error::Phone/source mismatch: expected 6.1.$EXPECTED_SUBLEVEL but synced $FULL_VERSION."
            echo "::error::Set manifest_snapshot_ref to the exact manifest revision matching the installed Android build."
            exit 1
          fi

          {
            echo "SUBLEVEL=$SUBLEVEL"
            echo "FULL_VERSION=$FULL_VERSION"
            echo "FILE_NAME=caimito-$FULL_VERSION-KSUN-SUSFS-ZeroMount"
          } >> "$GITHUB_ENV"

      - name: Initialize config fragment
        shell: bash
        run: |
          set -euo pipefail
          : > "$GITHUB_WORKSPACE/wild_gki.fragment"

      - name: Set up pinned KernelSU-Next
        shell: bash
        env:
          KSU_REF: ${{ inputs.ksu_next_ref }}
        working-directory: ${{ github.workspace }}/kernel/aosp
        run: |
          set -euo pipefail
          curl -LSs \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/${KSU_REF}/kernel/setup.sh" \
            | bash -s "$KSU_REF"

          test -d KernelSU-Next || {
            echo "::error::KernelSU-Next directory was not created"
            exit 1
          }
          test -e drivers/kernelsu || {
            echo "::error::drivers/kernelsu integration was not created"
            exit 1
          }

          KSU_COMMIT=$(git -C KernelSU-Next rev-parse HEAD)
          {
            echo "KSU_DIR=$PWD/KernelSU-Next"
            echo "KSU_RESOLVED_COMMIT=$KSU_COMMIT"
          } >> "$GITHUB_ENV"
          echo "KernelSU-Next resolved to $KSU_COMMIT"

      - name: Fix old-kernel compatibility before SUSFS patches
        if: ${{ inputs.apply_susfs }}
        shell: bash
        working-directory: ${{ github.workspace }}/kernel/aosp
        run: |
          set -euo pipefail
          FIX="$GITHUB_WORKSPACE/super-builders/$SB_HELPER_DIR/fix-old-kernel-compat.sh"
          test -f "$FIX"
          bash "$FIX" "$AOSP_DIR" "$SUBLEVEL"

      # Strict patching is intentional. A patch that needs fuzzy context is
      # rejected instead of producing a kernel that compiles but may panic.
      - name: Apply patch 50 - base SUSFS
        if: ${{ inputs.apply_susfs }}
        shell: bash
        working-directory: ${{ github.workspace }}/kernel/aosp
        run: |
          set -euo pipefail
          patch -p1 --fuzz=0 --no-backup-if-mismatch < \
            "$GITHUB_WORKSPACE/super-builders/$SB_PATCH_DIR/50_add_susfs_in_gki-${ANDROID_VER}-${KERNEL_VER}.patch"

      - name: Apply patch 51 - enhanced SUSFS
        if: ${{ inputs.apply_susfs && inputs.apply_enhanced_susfs }}
        shell: bash
        working-directory: ${{ github.workspace }}/kernel/aosp
        run: |
          set -euo pipefail
          patch -p1 --fuzz=0 --no-backup-if-mismatch < \
            "$GITHUB_WORKSPACE/super-builders/$SB_PATCH_DIR/51_enhanced_susfs-${ANDROID_VER}-${KERNEL_VER}.patch"

      - name: Apply patch 70 - KernelSU-Next safety integration
        if: ${{ inputs.apply_susfs && inputs.apply_ksu_safety }}
        shell: bash
        working-directory: ${{ github.workspace }}/kernel/aosp/KernelSU-Next
        run: |
          set -euo pipefail
          PATCH_FILE="$GITHUB_WORKSPACE/super-builders/$SB_PATCH_DIR/70_ksu_safety-kernelsu-next-${KERNEL_VER}.patch"
          test -s "$PATCH_FILE" || {
            echo "::error::Missing safety patch: $PATCH_FILE"
            exit 1
          }
          patch -p1 --fuzz=0 --no-backup-if-mismatch < "$PATCH_FILE"

      - name: Apply patch 60 - ZeroMount
        if: ${{ inputs.apply_susfs && inputs.apply_zeromount }}
        shell: bash
        working-directory: ${{ github.workspace }}/kernel/aosp
        run: |
          set -euo pipefail
          patch -p1 --fuzz=0 --no-backup-if-mismatch < \
            "$GITHUB_WORKSPACE/super-builders/$SB_PATCH_DIR/60_zeromount-${ANDROID_VER}-${KERNEL_VER}.patch"

      - name: Apply post-patch SUSFS compatibility fixes
        if: ${{ inputs.apply_susfs }}
        shell: bash
        working-directory: ${{ github.workspace }}/kernel/aosp
        run: |
          set -euo pipefail
          FIX="$GITHUB_WORKSPACE/super-builders/$SB_HELPER_DIR/fix-susfs-compat.sh"
          test -f "$FIX"
          bash "$FIX" \
            "$AOSP_DIR" \
            "$SUBLEVEL" \
            "$ANDROID_VER" \
            "$KERNEL_VER" \
            "$GITHUB_WORKSPACE/super-builders/$SB_PATCH_DIR"

      - name: Assemble Kleaf config fragment
        shell: bash
        env:
          ADD_SUSFS: ${{ inputs.apply_susfs }}
          ADD_OVERLAYFS: ${{ inputs.apply_overlayfs_support }}
        run: |
          set -euo pipefail
          FLAGS="--kleaf"
          [[ "$ADD_SUSFS" == "true" ]] && FLAGS="$FLAGS --susfs"
          [[ "$ADD_OVERLAYFS" == "true" ]] && FLAGS="$FLAGS --overlayfs"

          bash "$GITHUB_WORKSPACE/super-builders/$SB_HELPER_DIR/assemble-defconfig.sh" \
            "$GITHUB_WORKSPACE/super-builders/$SB_FRAGMENT" \
            "$GITHUB_WORKSPACE/wild_gki.fragment" \
            "$AOSP_DIR/arch/arm64/configs/gki_defconfig" \
            $FLAGS

          # KernelSU-Next has no KPM implementation.
          sed -i '/^CONFIG_KPM=/d;/^# CONFIG_KPM is not set$/d' \
            "$GITHUB_WORKSPACE/wild_gki.fragment"

          # Remove stale Super-Builders symbols that are not declared by the
          # exact Kconfig trees checked out in this run. This generalizes the
          # earlier two AUTO_ADD removals and prevents Kleaf config failures.
          while IFS= read -r cfg; do
            symbol="${cfg%%=*}"
            symbol="${symbol#CONFIG_}"
            if ! grep -RqsE \
              "^[[:space:]]*(menu)?config[[:space:]]+${symbol}([[:space:]]|$)" \
              --include='Kconfig' --include='Kconfig.*' \
              "$AOSP_DIR" "$KSU_DIR"; then
              echo "Removing undeclared Kconfig symbol: CONFIG_${symbol}"
              sed -i "/^CONFIG_${symbol}=/d" "$GITHUB_WORKSPACE/wild_gki.fragment"
            fi
          done < <(grep '^CONFIG_KSU_' "$GITHUB_WORKSPACE/wild_gki.fragment" || true)

          if ! grep -q '^CONFIG_KSU_SUSFS=y$' "$GITHUB_WORKSPACE/wild_gki.fragment"; then
            sed -i '/^CONFIG_KSU_SUSFS_/d' "$GITHUB_WORKSPACE/wild_gki.fragment"
          fi

          # De-duplicate, last entry wins.
          tac "$GITHUB_WORKSPACE/wild_gki.fragment" \
            | awk -F= '/^CONFIG_/{if(seen[$1]++)next} {print}' \
            | tac > "$GITHUB_WORKSPACE/wild_gki.fragment.tmp"
          mv "$GITHUB_WORKSPACE/wild_gki.fragment.tmp" \
            "$GITHUB_WORKSPACE/wild_gki.fragment"

          echo "----- final wild_gki.fragment -----"
          cat "$GITHUB_WORKSPACE/wild_gki.fragment"

      - name: Reject patch leftovers and suspicious fuzzy application
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t REJECTS < <(find "$KERNEL_ROOT" -type f -name '*.rej' -print)
          if (( ${#REJECTS[@]} > 0 )); then
            printf 'Patch reject: %s\n' "${REJECTS[@]}"
            exit 1
          fi

      - name: Relax protected-export build enforcement
        shell: bash
        working-directory: ${{ github.workspace }}/kernel
        run: |
          set -euo pipefail
          rm -rf aosp/android/abi_gki_protected_exports_*
          perl -pi -e \
            's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' \
            aosp/BUILD.bazel

          for f in aospodules.bzl aosp/aospodules.bzl; do
            if [[ -f "$f" ]]; then
              sed -i 's/protected_modules = \[.*\]/protected_modules = []/' "$f"
            fi
          done

          CHECKER="build/kernel/abi/check_buildtime_symbol_protection.py"
          if [[ -f "$CHECKER" ]]; then
            perl -i -pe \
              's/^(\s*)return 1$/$1return 0/g if /if missing_symbols:/../return 1/' \
              "$CHECKER"
          fi

      - name: Permit matching stock vendor modules during boot-only test
        if: ${{ inputs.allow_stock_module_version_mismatch }}
        shell: bash
        working-directory: ${{ github.workspace }}/kernel/aosp
        run: |
          set -euo pipefail
          TARGET="kernel/module/version.c"
          test -f "$TARGET" || {
            echo "::error::Module version checker not found: $TARGET"
            exit 1
          }

          if grep -q 'bad_version:' "$TARGET"; then
            sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET"
          else
            echo "::error::Expected bad_version label not found; refusing an unverified edit"
            exit 1
          fi

      - name: Clean generated dirty suffixes
        shell: bash
        working-directory: ${{ github.workspace }}/kernel
        run: |
          set -euo pipefail
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' \
            build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true
          sed -i 's/-dirty//g' aosp/scripts/setlocalversion 2>/dev/null || true

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C aosp add -A
          git -C aosp commit -q -m "caimito: KernelSU SUSFS ZeroMount build" || true

      - name: Build local AOSP kernel with Google's caimito target
        shell: bash
        working-directory: ${{ github.workspace }}/kernel
        env:
          BUILD_AOSP_KERNEL: "1"
          KMI_SYMBOL_LIST_STRICT_MODE: "0"
        run: |
          set -euo pipefail
          cp "$GITHUB_WORKSPACE/wild_gki.fragment" \
            aosp/arch/arm64/configs/wild_gki.fragment

          ./build_caimito.sh \
            --config=release \
            --stamp \
            --defconfig_fragment=//aosp:arch/arm64/configs/wild_gki.fragment

      - name: Validate official dist output and embedded config
        shell: bash
        env:
          REQUIRE_SUSFS: ${{ inputs.apply_susfs }}
        run: |
          set -euo pipefail
          test -d "$DIST_DIR"
          test -s "$DIST_DIR/boot.img"
          test -s "$DIST_DIR/Image.lz4"

          mkdir -p "$GITHUB_WORKSPACE/diagnostics"
          cp "$GITHUB_WORKSPACE/wild_gki.fragment" \
            "$GITHUB_WORKSPACE/diagnostics/wild_gki.fragment"
          cp "$GITHUB_WORKSPACE/pinned-manifest.xml" \
            "$GITHUB_WORKSPACE/diagnostics/pinned-manifest.xml"

          lz4 -d -f "$DIST_DIR/Image.lz4" "$RUNNER_TEMP/Image"
          "$AOSP_DIR/scripts/extract-ikconfig" "$RUNNER_TEMP/Image" \
            > "$GITHUB_WORKSPACE/diagnostics/built.config"

          grep -q '^CONFIG_KSU=y$' "$GITHUB_WORKSPACE/diagnostics/built.config" || {
            echo "::error::Built kernel does not contain CONFIG_KSU=y"
            exit 1
          }

          if [[ "$REQUIRE_SUSFS" == "true" ]]; then
            grep -q '^CONFIG_KSU_SUSFS=y$' "$GITHUB_WORKSPACE/diagnostics/built.config" || {
              echo "::error::Built kernel does not contain CONFIG_KSU_SUSFS=y"
              exit 1
            }
          fi

          {
            echo "Kernel source: $FULL_VERSION"
            echo "KernelSU-Next: $KSU_RESOLVED_COMMIT"
            echo "Manifest branch: ${{ inputs.pixel_manifest_branch }}"
            echo "Manifest snapshot: ${{ inputs.manifest_snapshot_ref }}"
            echo "Dist directory: $DIST_DIR"
          } > "$GITHUB_WORKSPACE/diagnostics/build-info.txt"

          (cd "$DIST_DIR" && sha256sum boot.img Image.lz4) \
            > "$GITHUB_WORKSPACE/diagnostics/SHA256SUMS"

      - name: Prepare official boot artifact
        shell: bash
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/official-boot"
          mkdir -p "$OUT"
          cp "$DIST_DIR/boot.img" "$OUT/boot.img"
          cp "$DIST_DIR/Image.lz4" "$OUT/Image.lz4"
          cp -a "$GITHUB_WORKSPACE/diagnostics/." "$OUT/"

          cat > "$OUT/TESTING.txt" <<'EOF'
          TEST FIRST; DO NOT FLASH PERMANENTLY ON THE FIRST ATTEMPT.

          Bootloader command:
            fastboot boot boot.img

          This boot.img is copied unchanged from Google's official Kleaf output:
            out/caimito/dist/boot.img

          It is not rebuilt with mkbootimg and it is not signed with a random key.
          If the temporary boot loops, hold Power + Volume Down to return to the
          bootloader, then choose Start to boot the unchanged installed slot.
          EOF

      - name: Prepare AnyKernel3 package
        shell: bash
        run: |
          set -euo pipefail
          git clone -q --depth=1 -b gki-2.0 \
            https://github.com/WildKernels/AnyKernel3.git \
            "$GITHUB_WORKSPACE/AnyKernel3"

          cp "$DIST_DIR/Image.lz4" "$GITHUB_WORKSPACE/AnyKernel3/Image.lz4"
          rm -rf "$GITHUB_WORKSPACE/AnyKernel3/.git" \
                 "$GITHUB_WORKSPACE/AnyKernel3/.github"

          cd "$GITHUB_WORKSPACE/AnyKernel3"
          zip -r9 "$GITHUB_WORKSPACE/${FILE_NAME}-AnyKernel3.zip" . \
            -x '*.git*' >/dev/null

      - name: Prepare optional full dist package
        if: ${{ inputs.upload_full_dist }}
        shell: bash
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/full-dist"
          mkdir -p "$OUT"
          for file in \
            boot.img Image Image.lz4 dtbo.img dtb.img \
            vendor_kernel_boot.img vendor_dlkm.img system_dlkm.img; do
            [[ -f "$DIST_DIR/$file" ]] && cp "$DIST_DIR/$file" "$OUT/"
          done
          cp -a "$GITHUB_WORKSPACE/diagnostics/." "$OUT/"

      - name: Upload official Kleaf boot image
        uses: actions/upload-artifact@v4
        with:
          name: caimito-6.1.${{ inputs.expected_sublevel }}-KSUN-SUSFS-ZeroMount-official-boot
          path: official-boot/**
          if-no-files-found: error
          compression-level: 0

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: caimito-6.1.${{ inputs.expected_sublevel }}-KSUN-SUSFS-ZeroMount-AnyKernel3
          path: "*-AnyKernel3.zip"
          if-no-files-found: error
          compression-level: 0

      - name: Upload optional full dist
        if: ${{ inputs.upload_full_dist }}
        uses: actions/upload-artifact@v4
        with:
          name: caimito-6.1.${{ inputs.expected_sublevel }}-KSUN-SUSFS-ZeroMount-full-dist
          path: full-dist/**
          if-no-files-found: error
          compression-level: 0

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: caimito-build-failure-diagnostics
          path: |
            pinned-manifest.xml
            wild_gki.fragment
            diagnostics/**
            kernel/**/.config
            kernel/**/*.rej
            kernel/**/*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Build summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Pixel 9 Pro XL kernel build"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Manifest | \`${{ inputs.pixel_manifest_branch }}\` |"
            echo "| Snapshot | \`${{ inputs.manifest_snapshot_ref || 'branch tip' }}\` |"
            echo "| Expected sublevel | \`${{ inputs.expected_sublevel }}\` |"
            echo "| Synced kernel | \`${FULL_VERSION:-not reached}\` |"
            echo "| KernelSU-Next | \`${KSU_RESOLVED_COMMIT:-not reached}\` |"
            echo "| SUSFS | \`${{ inputs.apply_susfs }}\` |"
            echo "| Enhanced SUSFS | \`${{ inputs.apply_enhanced_susfs }}\` |"
            echo "| ZeroMount | \`${{ inputs.apply_zeromount }}\` |"
            echo "| Safety patch | \`${{ inputs.apply_ksu_safety }}\` |"
            echo "| Local AOSP kernel forced | \`BUILD_AOSP_KERNEL=1\` |"
            echo "| Boot image source | \`out/caimito/dist/boot.img\` |"
          } >> "$GITHUB_STEP_SUMMARY"

